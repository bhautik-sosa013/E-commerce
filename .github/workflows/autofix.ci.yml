name: autofix.ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["main"]

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Added --ignore-path to skip the .github folder
      - name: Run Prettier
        run: npx prettier --write . --ignore-path .github

      # Added --ignore-pattern to skip the .github folder
      - name: Run ESLint auto-fix
        run: npx eslint . --fix --ignore-pattern ".github/**"

      - name: Autofix CI
        uses: autofix-ci/action@8bc06253bec489732e5f9c52884c7cace15c0160
        with:
          fail-fast: true
