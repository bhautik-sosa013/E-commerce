name: autofix.ci

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: write # Needed to push the fixes

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: npm ci

      - name: Run fixes
        run: |
          # Format EVERYTHING except the .github directory
          npx prettier --write . --ignore-path .gitignore

          # Fix ESLint issues in the root and src
          # We include the root config files because your log shows autofix wants to fix vite.config.ts
          npx eslint . --fix

      - uses: autofix-ci/action@v1
        if: always()
