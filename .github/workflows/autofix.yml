name: autofix.ci

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config --global user.name "autofix-ci[bot]"
          git config --global user.email "autofix-ci[bot]@users.noreply.github.com"

      - name: Run Prettier (code formatting)
        run: npx prettier --write "src/**/*.{ts,tsx,css,json}" || true

      - name: Run ESLint (linting and fixing)
        run: npx eslint . --fix || true

      - uses: autofix-ci/action@v1
