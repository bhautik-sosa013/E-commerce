name: autofix.ci

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier (code formatting)
        run: npx prettier --write "src/**/*.{ts,tsx,css,json}"

      - name: Run ESLint (linting and fixing)
        run: npx eslint src --ext .ts,.tsx --fix --max-warnings 0

      - name: Run type checking
        run: npx tsc --noEmit

      - uses: autofix-ci/action@v1
        if: always()
