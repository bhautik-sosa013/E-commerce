name: autofix.ci

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier (code formatting)
        run: npx prettier --write "src/**/*.{ts,tsx,css,json}"
        continue-on-error: true

      - name: Run ESLint (linting and fixing)
        run: npx eslint . --fix
        continue-on-error: true

      - uses: autofix-ci/action@v1
