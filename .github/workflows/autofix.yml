name: autofix.ci

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: write # Crucial: Allows the bot to commit the fixes

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Use stable v4

      - uses: actions/setup-node@v4 # Use stable v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: npm ci

      - name: Run fixes
        run: |
          # Format code (ensure .prettierignore handles .github)
          npx prettier --write . --ignore-path .prettierignore
          
          # Fix React/TS logic errors
          npx eslint src --ext .ts,.tsx --fix

      - uses: autofix-ci/action@v1
        if: always()
